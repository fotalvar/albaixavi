<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boda Alba i Xavi</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>
  <main class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-logo-container">
      <img src="assets/img/logo.svg" alt="logo" class="hero-logo">
    </div>
  </main>

  <section class="countdown-container">
    <div id="countdown" class="countdown"></div>

  <section class="location-section">

    <div class="location-card">
      <h2 class="location-title">Com arribar</h2>
      <p class="location-desc">La casa de colònies Can Sans està situada al veïnat de Fellines, als afores de Viladasens. Situada a uns 20 quilòmetres de Girona, Banyoles i Figueres.</p>
      <p class="location-address">Cami de Fellines s/n<br>Viladasens (Girona)</p>
      <a class="maps-btn" href="https://maps.app.goo.gl/ukFLAEK5EjDUNGdo9" target="_blank" rel="noopener">
        Google Maps
      </a>
    </div>
